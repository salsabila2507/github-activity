name: Daily Auto Commit

on:
  schedule:
    - cron: '0 1 * * *'  # Setiap hari jam 1 pagi UTC (8 pagi WIB)
  workflow_dispatch:  # Bisa trigger manual juga

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure Git
        run: |
          git config --global user.name "salsabila2507"
          git config --global user.email "salsabila2507@users.noreply.github.com"
      
      - name: Create daily activity
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          DAY=$(date '+%j')
          YEAR=$(date '+%Y')
          
          QUOTES=(
            "Consistency is key to success 🚀"
            "Small daily improvements lead to stunning results 💪"
            "Keep pushing forward, one commit at a time 🔥"
            "Building great things takes time and dedication ⚡"
            "Every day is a chance to improve 🌟"
            "Progress over perfection 📈"
            "Stay committed to your goals 🎯"
            "Code today, conquer tomorrow 💻"
          )
          
          RANDOM_QUOTE=${QUOTES[$RANDOM % ${#QUOTES[@]}]}
          
          cat > ACTIVITY.md << EOF
          # Daily Activity Log
          
          ## 📅 Date: $DATE
          **Day #$DAY of $YEAR**
          
          ### 🎯 Today's Progress
          $RANDOM_QUOTE
          
          ### 📊 Streak Status
          - ✅ Commit maintained
          - 🔥 Keeping the streak alive!
          
          ---
          *Auto-generated by GitHub Actions*
          EOF
      
      - name: Commit and Push
        run: |
          git add ACTIVITY.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 Daily update - $(date '+%Y-%m-%d')" && git push)
